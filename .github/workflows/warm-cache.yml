name: Warm Cache

# Restores the Nuitka ccache on each platform every 6 days.
# GitHub caches expire after 7 days of no access; this keeps them alive
# without running a full build.

on:
  schedule:
    - cron: '0 3 */6 * *'

jobs:
  warm:
    name: warm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup ccache
        uses: ./.github/actions/setup-ccache
