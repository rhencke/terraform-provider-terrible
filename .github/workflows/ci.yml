name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: uv sync

      - name: Run all tests (unit + integration)
        run: make test-all

      - name: Install tfplugindocs
        run: |
          curl -fsSL https://github.com/hashicorp/terraform-plugin-docs/releases/download/v0.20.0/tfplugindocs_0.20.0_linux_amd64.zip -o /tmp/tfplugindocs.zip
          unzip -o /tmp/tfplugindocs.zip tfplugindocs -d /usr/local/bin

      - name: Check docs are up to date
        run: |
          make install-provider docs
          if ! git diff --exit-code docs/; then
            echo "ERROR: docs/ is stale — run 'make docs' and commit the result."
            exit 1
          fi
